server {
    listen 80;
    server_name _;

    # Each hostname has its own directory, for example:
    # /srv/ftp/swimtime.online and /srv/ftp/files.client2.ru
    root /srv/ftp/$host;
    index index.html;

    autoindex on;
    autoindex_exact_size off;
    autoindex_localtime on;

    location / {
        try_files $uri $uri/ =404;
    }
}
